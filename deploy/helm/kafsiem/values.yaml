image:
  repository: ghcr.io/scalytics/kafsiem
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

# PSA-restricted-compatible defaults (PLAN-06 E-04 / audit F-4).
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

service:
  type: ClusterIP
  port: 8500
  targetPort: 80

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 64Mi

probes:
  liveness:
    httpGet: { path: /, port: 80 }
    initialDelaySeconds: 5
    periodSeconds: 10
  readiness:
    httpGet: { path: /, port: 80 }
    initialDelaySeconds: 2
    periodSeconds: 5

serviceAccount:
  create: true
  name: ""

labels:
  app.kubernetes.io/part-of: ops-foundation
