apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kafsiem.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kafsiem.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kafsiem.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kafsiem.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "kafsiem.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: kafsiem
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 80
          livenessProbe:
            {{- toYaml .Values.probes.liveness | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.probes.readiness | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kafsiem.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kafsiem.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
  selector:
    {{- include "kafsiem.selectorLabels" . | nindent 4 }}
---
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kafsiem.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kafsiem.labels" . | nindent 4 }}
{{- end }}
